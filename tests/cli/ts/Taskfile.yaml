version: "3"

tasks:
  default:
    deps:
      - build
      - vet
      - test

  build:
    desc: Compile every package in ts.
    dir: ../../..
    cmds:
      - GOWORK=off go build ./...

  vet:
    desc: Run go vet across the module.
    dir: ../../..
    cmds:
      - GOWORK=off go vet ./...

  test:
    desc: Run unit tests.
    dir: ../../..
    cmds:
      - GOWORK=off go test -count=1 ./...
